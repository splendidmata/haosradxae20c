name: Build HomeAssistant OS for Radxa E20C

on:
  workflow_dispatch:
    inputs:
      haos_version:
        description: 'HAOS version branch'
        required: true
        default: 'dev'
      kernel_version:
        description: 'Linux kernel version (needs >=6.13 for RK3528 DTS)'
        required: true
        default: '6.18.35'
      uboot_branch:
        description: 'Radxa U-Boot branch/tag'
        required: true
        default: 'next-dev-v2024.10'

jobs:
  build:
    name: Build E20C HAOS Image
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout board config
        uses: actions/checkout@v4
        with:
          path: e20c-haos

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/chromium
          sudo docker image prune -af || true

      - name: Install build dependencies
        run: |
          # Disable needrestart to prevent dpkg hangs
          export DEBIAN_FRONTEND=noninteractive
          sudo sed -i 's/#$nrconf{restart} = .*/$nrconf{restart} = "a";/' /etc/needrestart/needrestart.conf 2>/dev/null || true

          sudo apt update
          sudo apt install -y \
            git build-essential gcc g++ make bison flex \
            libssl-dev libncurses-dev libelf-dev bc \
            xz-utils cpio rsync wget unzip python3 python3-pip \
            device-tree-compiler u-boot-tools \
            qemu-user-static binfmt-support \
            dosfstools mtools e2fsprogs gdisk \
            podman
          sudo touch /etc/containers/nodocker

      - name: Clone HomeAssistant OS
        run: |
          git clone --depth=1 --branch=${{ inputs.haos_version }} \
            https://github.com/home-assistant/operating-system.git haos
          cd haos
          git submodule update --init --depth=1

      - name: Install E20C board files
        run: |
          sudo apt install -y dos2unix 2>/dev/null || true
          mkdir -p haos/buildroot-external/board/radxa/e20c
          cp -r e20c-haos/board/radxa/e20c/* haos/buildroot-external/board/radxa/e20c/
          cp e20c-haos/configs/radxa_e20c_defconfig haos/buildroot-external/configs/
          # Fix Windows line endings (CRLF -> LF) for shell scripts
          dos2unix haos/buildroot-external/board/radxa/e20c/haos-hook.sh 2>/dev/null || sed -i 's/\r$//' haos/buildroot-external/board/radxa/e20c/haos-hook.sh
          chmod +x haos/buildroot-external/board/radxa/e20c/haos-hook.sh

      - name: Verify U-Boot defconfig exists
        run: |
          echo "Checking which U-Boot defconfig is available for E20C/RK3528..."
          UBOOT_REPO="https://github.com/radxa/u-boot.git"
          UBOOT_BRANCH="${{ inputs.uboot_branch }}"

          # Shallow clone Radxa U-Boot
          git clone --depth=1 --branch="${UBOOT_BRANCH}" "${UBOOT_REPO}" /tmp/uboot-check

          cd /tmp/uboot-check

          FOUND_DEFCONFIG=""
          for dc in radxa-e20c-rk3528 radxa_e20c_rk3528 evb-rk3528 rk3528; do
            if [ -f "configs/${dc}_defconfig" ]; then
              FOUND_DEFCONFIG="${dc}"
              echo "Using U-Boot defconfig: ${dc}_defconfig"
              break
            fi
          done

          if [ -z "${FOUND_DEFCONFIG}" ]; then
            echo "ERROR: No suitable U-Boot defconfig found!"
            echo "Available RK3528-related configs:"
            find configs/ -name '*rk3528*' -o -name '*e20c*' || true
            exit 1
          fi

          # Export to subsequent steps
          echo "UBOOT_DEFCONFIG=${FOUND_DEFCONFIG}" >> $GITHUB_ENV

      - name: Patch defconfig with correct U-Boot defconfig
        run: |
          # Replace the defconfig name in the Buildroot config
          DEFCONFIG_PATH="haos/buildroot-external/configs/radxa_e20c_defconfig"
          # Use sed to replace the placeholder
          sed -i "s/BR2_TARGET_UBOOT_BOARD_DEFCONFIG=.*/BR2_TARGET_UBOOT_BOARD_DEFCONFIG=\"${UBOOT_DEFCONFIG}\"/" "${DEFCONFIG_PATH}"
          echo "Set U-Boot defconfig to: ${UBOOT_DEFCONFIG}"

      - name: Update kernel version in defconfig
        run: |
          DEFCONFIG_PATH="haos/buildroot-external/configs/radxa_e20c_defconfig"
          KERNEL_VER="${{ inputs.kernel_version }}"
          sed -i "s/BR2_LINUX_KERNEL_CUSTOM_VERSION_VALUE=.*/BR2_LINUX_KERNEL_CUSTOM_VERSION_VALUE=\"${KERNEL_VER}\"/" "${DEFCONFIG_PATH}"
          # Note: BR2_PACKAGE_HOST_LINUX_HEADERS_CUSTOM_6_12 is kept as-is;
          # it only needs to be >= toolchain minimum, not match kernel version.

      - name: Update U-Boot version in defconfig
        run: |
          DEFCONFIG_PATH="haos/buildroot-external/configs/radxa_e20c_defconfig"
          sed -i "s|BR2_TARGET_UBOOT_CUSTOM_REPO_VERSION=.*|BR2_TARGET_UBOOT_CUSTOM_REPO_VERSION=\"${{ inputs.uboot_branch }}\"|" "${DEFCONFIG_PATH}"

      - name: Restore Buildroot cache
        uses: actions/cache@v4
        with:
          path: |
            /tmp/buildroot-dl
            /tmp/buildroot-ccache
          key: buildroot-e20c-${{ inputs.haos_version }}-${{ inputs.kernel_version }}-v1

      - name: Build HAOS
        working-directory: haos
        run: |
          mkdir -p /tmp/buildroot-dl /tmp/buildroot-ccache

          # Add cache paths to defconfig
          echo "BR2_DL_DIR=/tmp/buildroot-dl" >> buildroot-external/configs/radxa_e20c_defconfig
          echo "BR2_CCACHE=y" >> buildroot-external/configs/radxa_e20c_defconfig
          echo "BR2_CCACHE_DIR=/tmp/buildroot-ccache" >> buildroot-external/configs/radxa_e20c_defconfig

          # Configure Buildroot
          make BR2_EXTERNAL=buildroot-external radxa_e20c_defconfig

          # Build everything
          make BR2_EXTERNAL=buildroot-external -j$(nproc) 2>&1 | tee build.log

      - name: Verify image structure
        run: |
          echo "============================================"
          echo "  E20C HAOS Image Verification Report"
          echo "============================================"
          echo ""

          IMAGE_DIR="haos/output/images"
          IMAGE=$(ls ${IMAGE_DIR}/sdcard.img 2>/dev/null | head -1)

          if [ -z "${IMAGE}" ]; then
            echo "!!! FAIL: No sdcard.img found !!!"
            ls -lh ${IMAGE_DIR}/ 2>/dev/null
            exit 1
          fi

          IMAGE_SIZE=$(du -h "${IMAGE}" | cut -f1)
          echo "[OK] Image found: ${IMAGE} (${IMAGE_SIZE})"

          # 1. Check GPT partition table
          echo ""
          echo "--- Partition table ---"
          sudo gdisk -l "${IMAGE}" | grep -E "^\s+[0-9]" || echo "WARN: No partitions detected"

          # 2. Identify partition offsets via sgdisk
          PART_INFO=$(sudo sgdisk -p "${IMAGE}")
          echo "${PART_INFO}"

          # Try to find boot and root partitions
          BOOT_SECTOR=$(echo "${PART_INFO}" | grep -i "EFI\|boot\|FAT" | head -1 | awk '{print $2}')
          ROOT_SECTOR=$(echo "${PART_INFO}" | grep -i "root\|Linux" | head -1 | awk '{print $2}')

          if [ -z "${BOOT_SECTOR}" ] || [ -z "${ROOT_SECTOR}" ]; then
            echo "WARN: Could not auto-detect partitions. Trying sector 34+..."
            # Fallback: assume partition 1 = boot, partition 2 = root
            BOOT_SECTOR=32768   # sector 16M (default offset)
            ROOT_SECTOR=557056   # sector 272M
          fi

          BOOT_OFFSET=$((BOOT_SECTOR * 512))
          ROOT_OFFSET=$((ROOT_SECTOR * 512))

          echo ""
          echo "Boot partition offset: ${BOOT_OFFSET} (sector ${BOOT_SECTOR})"
          echo "Root partitiion offset: ${ROOT_OFFSET} (sector ${ROOT_SECTOR})"

          # 3. Mount boot partition and check contents
          echo ""
          echo "--- Boot partition contents ---"
          mkdir -p /tmp/boot-check
          sudo mount -o ro,loop,offset=${BOOT_OFFSET} "${IMAGE}" /tmp/boot-check 2>/dev/null || {
            echo "WARN: Could not mount boot partition at offset ${BOOT_OFFSET}"
            # Try without offset (raw VFAT image)
            BOOT_IMG=$(ls ${IMAGE_DIR}/boot*.fat 2>/dev/null | head -1)
            if [ -n "${BOOT_IMG}" ]; then
              sudo mount -o ro,loop "${BOOT_IMG}" /tmp/boot-check
            fi
          }

          if mountpoint -q /tmp/boot-check; then
            echo "Boot partition mounted OK"
            ls -lh /tmp/boot-check/

            # Check for kernel
            if [ -f /tmp/boot-check/Image ]; then
              echo "[OK] Kernel Image present ($(du -h /tmp/boot-check/Image | cut -f1))"
            else
              echo "!!! FAIL: Kernel Image missing !!!"
            fi

            # Check for DTB
            DTB=$(ls /tmp/boot-check/rk3528*.dtb 2>/dev/null | head -1)
            if [ -n "${DTB}" ]; then
              echo "[OK] Device tree present: $(basename ${DTB})"
            else
              echo "!!! FAIL: No rk3528 device tree found !!!"
            fi

            # Check for boot script
            if [ -f /tmp/boot-check/boot.scr ]; then
              echo "[OK] boot.scr present"
            else
              echo "WARN: boot.scr missing"
            fi

            # Check for haos-config / cmdline
            if [ -f /tmp/boot-check/cmdline.txt ]; then
              echo "[OK] cmdline.txt present"
              echo "    $(cat /tmp/boot-check/cmdline.txt)"
            fi

            sudo umount /tmp/boot-check
          else
            echo "WARN: Could not inspect boot partition"
          fi

          # 4. Check rootfs hash store (if EROFS)
          echo ""
          echo "--- Root filesystem check ---"
          if ls ${IMAGE_DIR}/rootfs.erofs 1>/dev/null 2>&1; then
            ROOTFS_IMG=$(ls ${IMAGE_DIR}/rootfs.erofs | head -1)
            SIZE=$(du -h "${ROOTFS_IMG}" | cut -f1)
            echo "[OK] EROFS rootfs: ${ROOTFS_IMG} (${SIZE})"
          elif ls ${IMAGE_DIR}/rootfs.ext* 1>/dev/null 2>&1; then
            ROOTFS_IMG=$(ls ${IMAGE_DIR}/rootfs.ext* | head -1)
            SIZE=$(du -h "${ROOTFS_IMG}" | cut -f1)
            echo "[OK] EXT rootfs: ${ROOTFS_IMG} (${SIZE})"
          else
            echo "WARN: No standalone rootfs image found (embedded in sdcard.img)"
          fi

          echo ""
          echo "============================================"
          echo "  Verification complete"
          echo "============================================"

      - name: Show build results
        working-directory: haos
        run: |
          echo "=== Output images ==="
          ls -lh output/images/ 2>/dev/null || echo "No output/images directory"
          echo ""
          echo "=== Disk image contents ==="
          file output/images/*.img 2>/dev/null || echo "No .img files"

      - name: Upload HAOS image
        uses: actions/upload-artifact@v4
        with:
          name: haos-radxa-e20c
          path: |
            haos/output/images/*.img
            haos/output/images/*.img.xz
          retention-days: 7

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: haos/build.log
          retention-days: 3
